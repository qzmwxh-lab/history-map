<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拓荒者足迹 | 数字化文旅历史地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        
        /* 地图满屏 */
        #map { width: 100%; height: 100%; z-index: 1; }

        /* 半屏抽屉 */
        .drawer {
            position: fixed; bottom: 0; left: 0; width: 100%; max-height: 50%;
            background: white; z-index: 999; border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            transform: translateY(100%); transition: transform 0.3s ease-out;
            display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom);
        }
        .drawer.show { transform: translateY(0); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 28px; color: #999; cursor: pointer; z-index: 1001; }
        .poi-cover { width: 100%; height: 180px; object-fit: cover; border-radius: 20px 20px 0 0; }
        .poi-content { padding: 20px; overflow-y: auto; flex: 1; }
        .poi-title { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .poi-meta { font-size: 13px; color: #95a5a6; margin-bottom: 10px; }
        .poi-story { font-size: 15px; color: #34495e; line-height: 1.6; white-space: pre-line; }
        
        /* 操作按钮 */
        .poi-actions { display: flex; padding: 15px 20px; background: #f8f9fa; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 25px; color: white; font-size: 15px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-vr { background: #2ecc71; }
        .btn-nav { background: #3498db; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="drawer" class="drawer">
        <div class="close-btn" onclick="closeDrawer()">×</div>
        <img id="poi-cover" class="poi-cover" src="" alt="封面">
        <div class="poi-content">
            <div id="poi-title" class="poi-title"></div>
            <div id="poi-meta" class="poi-meta"></div>
            <div id="poi-story" class="poi-story"></div>
        </div>
        <div class="poi-actions">
            <a id="btn-vr" class="btn btn-vr" href="" target="_blank">🌐 云游 360° VR 空间</a>
            <button id="btn-nav" class="btn btn-nav" onclick="invokeNavigation()">🚗 唤醒地图导航</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 初始化地图中心到浙江衢州区
        const map = L.map('map', { zoomControl: false }).setView([28.957608, 118.875885], 13);
        
        // 使用干净整洁的开源国际地图底图
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let currentPoi = null;

        // 🌟 核心改动：网站开始实时呼吸读取你的 Notion 数据
        const NOTION_DATA_URL = 'https://notion-api.splitbee.io/v1/table/375b936d83cc8086bb80e04bad65997a';

        fetch(NOTION_DATA_URL)
            .then(response => response.json())
            .then(mockPois => {
                // 过滤掉经纬度没填的空行，防止报错
                const validPois = mockPois.filter(poi => poi.lat && poi.lng);

                // 1. 根据 Notion 表格里的行顺序自动绘制轨迹连线
                const linePoints = validPois.map(poi => [parseFloat(poi.lat), parseFloat(poi.lng)]);
                L.polyline(linePoints, { color: '#A0522D', weight: 4, opacity: 0.8 }).addTo(map);

                // 2. 在地图上全自动打点
                validPois.forEach(poi => {
                    const marker = L.marker([parseFloat(poi.lat), parseFloat(poi.lng)]).addTo(map);
                    marker.on('click', () => {
                        currentPoi = poi;
                        map.setView([parseFloat(poi.lat), parseFloat(poi.lng)], 15);
                        
                        // 填充抽屉资产
                        document.getElementById('poi-cover').src = poi.cover || 'https://picsum.photos/800/400?random=default';
                        document.getElementById('poi-title').innerText = poi.name;
                        document.getElementById('poi-meta').innerText = `历史时期：${poi.era || '未考证'}`;
                        document.getElementById('poi-story').innerText = poi.story || '暂无故事内容';
                        
                        // VR 按钮显示/隐藏控制
                        if(poi.vr_url) {
                            document.getElementById('btn-vr').style.display = 'block';
                            document.getElementById('btn-vr').href = poi.vr_url;
                        } else {
                            document.getElementById('btn-vr').style.display = 'none';
                        }

                        document.getElementById('drawer').classList.add('show');
                    });
                });
            })
            .catch(err => console.error("读取 Notion 地图数据失败:", err));

        function closeDrawer() {
            document.getElementById('drawer').classList.remove('remove');
            document.getElementById('drawer').classList.remove('show');
        }

        // 唤醒第三方 App 导航协议
        function invokeNavigation() {
            if (!currentPoi) return;
            const lat = currentPoi.lat;
            const lng = currentPoi.lng;
            const name = encodeURIComponent(currentPoi.name);

            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                window.location.href = `maps://?q=${name}&ll=${lat},${lng}`;
                return;
            }
            const choice = confirm("点击【确定】唤醒手机高德地图导航，点击【取消】唤醒百度地图");
            if (choice) {
                window.location.href = `amapuri://route/plan/?did=&dlat=${lat}&dlon=${lng}&dname=${name}&dev=0&t=0`;
            } else {
                window.location.href = `baidumap://map/direction?destination=latlng:${lat},${lng}|name:${name}&mode=driving`;
            }
        }
    </script>
</body>
</html>
