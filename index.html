<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>拓荒者足迹 · 数字化智慧文旅历史轨迹</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#3f7a5c">
<meta name="mobile-web-app-capable" content="yes">
<!-- iOS 专项配置 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="拓荒者足迹">
<link rel="apple-touch-icon" href="/pwa-icons/icon-152.png">
<link rel="apple-touch-icon" sizes="180x180" href="/pwa-icons/icon-192.png">
<!-- PC 端图标 -->
<link rel="icon" type="image/png" sizes="32x32" href="/pwa-icons/icon-96.png">
<link rel="icon" type="image/png" sizes="192x192" href="/pwa-icons/icon-192.png">
<!-- SEO -->
<meta name="description" content="数字化智慧文旅历史轨迹——在地图上发现身边的历史故事、360°全景探索">
<meta name="keywords" content="文旅,历史,地图,360全景,VR,拓荒者">
<link rel="preconnect" href="https://fonts.font.im">
<link href="https://fonts.font.im/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#2b2620;
    --paper:#ece1c8;
    --paper-deep:#d9c79f;
    --paper-edge:#c4b186;
    --jade:#3f7a5c;
    --jade-deep:#2c5841;
    --jade-soft:rgba(63,122,92,.16);
    --seal:#9c3b2c;
    --qing:#6b4423;
    --republic:#335c82;
    --modern:#3a7d5c;
    --gold:#b8915a;
    --gold-soft:rgba(184,145,90,.4);
    --font-display:'Ma Shan Zheng', cursive;
    --font-body:'Noto Serif SC', serif;
    --font-mono:'Roboto Mono', monospace;
    --sidebar-w:330px;
    --radius-lg:16px;
    --radius-md:10px;
    --shadow-sm:0 4px 12px rgba(0,0,0,.08);
    --shadow-md:0 12px 30px rgba(0,0,0,.15);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:var(--font-body);color:var(--ink);}
  body{overflow:hidden;}
  #map{position:absolute;inset:0;z-index:1;background:#cfd6cf;}

  /* ---------- 左侧常驻侧栏（电脑端） ---------- */
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
    background:linear-gradient(180deg,var(--paper) 0%, var(--paper-deep) 100%);
    border-right:1px solid var(--paper-edge);
    box-shadow:6px 0 24px rgba(0,0,0,.18);
    z-index:400;display:flex;flex-direction:column;
    transform:translateX(0);transition:transform .5s cubic-bezier(.22,.61,.36,1);
    animation:slideInLeft .6s cubic-bezier(.22,.61,.36,1);
  }
  @keyframes slideInLeft{from{transform:translateX(-100%);}to{transform:translateX(0);}}
  #sidebar .sb-header{padding:26px 22px 16px;border-bottom:1px solid var(--gold-soft);position:relative;}
  #sidebar .sb-header::after{content:"";position:absolute;left:22px;right:22px;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
  #sidebar h1{font-family:var(--font-display);font-size:34px;line-height:1;margin:0 0 6px;color:var(--ink);letter-spacing:1px;}
  #sidebar .sb-sub">span{font-size:12px;letter-spacing:3px;color:#6b6048;margin:0 0 16px;display:flex;align-items:center;gap:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#b4a276;flex-shrink:0;}
  .sync-dot.live{background:var(--jade);animation:pulseGlow 1.8s ease-in-out infinite;}
  .login-btn{
    font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:1px;
    border:1px solid var(--jade-deep);background:var(--jade-soft);color:var(--jade-deep);
    padding:9px 16px;border-radius:20px;cursor:pointer;transition:.25s;display:inline-flex;align-items:center;gap:6px;
  }
  .login-btn:hover{background:var(--jade);color:#fff;}
  .login-btn.admin-on{
    background:var(--jade-deep);color:#eaffef;border-color:var(--jade-deep);
    animation:pulseGlow 1.6s ease-in-out infinite;
  }
  @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(63,122,92,.55);}50%{box-shadow:0 0 0 8px rgba(63,122,92,0);}}

  #ranking-wrap{flex:1;overflow-y:auto;padding:10px 0 16px;}
  #ranking-wrap::-webkit-scrollbar{width:5px;}
  #ranking-wrap::-webkit-scrollbar-thumb{background:var(--gold-soft);border-radius:3px;}
  #ranking-list{list-style:none;margin:0;padding:0;}
  #ranking-list li{
    display:flex;align-items:center;gap:12px;padding:13px 22px;cursor:pointer;
    border-bottom:1px solid rgba(184,145,90,.18);transition:background .2s;
  }
  #ranking-list li:hover, #ranking-list li.active{background:rgba(63,122,92,.1);}
  #ranking-list li.dragging{opacity:.35;}
  #ranking-list li.drag-over{box-shadow:inset 0 2px 0 0 var(--jade);}
  #ranking-list li[draggable="true"]{cursor:grab;}
  #ranking-list .drag-handle{color:#9c8a63;font-size:13px;cursor:grab;flex-shrink:0;}
  #ranking-list .num{font-family:var(--font-mono);font-size:12px;color:#8a7a5c;min-width:30px;}
  #ranking-list .name{flex:1;font-size:15px;font-weight:600;}
  #ranking-list .era-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  #ranking-list .li-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s;}
  #ranking-list li:hover .li-actions{opacity:1;}
  #ranking-list .li-edit,#ranking-list .li-del{
    width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;
    font-size:12.5px;cursor:pointer;flex-shrink:0;
  }
  #ranking-list .li-edit{color:var(--jade-deep);} #ranking-list .li-edit:hover{background:var(--jade-soft);}
  #ranking-list .li-del{color:var(--seal);} #ranking-list .li-del:hover{background:rgba(156,59,44,.14);}
  .relocate-hint{font-size:11.5px;color:var(--jade-deep);background:var(--jade-soft);padding:7px 10px;border-radius:7px;margin:-4px 0 12px;}
  .era-qing{background:var(--qing);} .era-republic{background:var(--republic);} .era-modern{background:var(--modern);} .era-other{background:#8a7a5c;}
  #sidebar .demo-banner{margin:0 22px 14px;padding:8px 12px;background:rgba(156,59,44,.1);border:1px dashed var(--seal);border-radius:8px;font-size:11px;color:var(--seal);line-height:1.5;}

  /* ---------- 手机端控制条及优化后的按钮 ---------- */
  #mobile-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:400;padding:10px 96px 10px 56px;gap:8px;align-items:center;}
  #mobile-bar .login-btn-m{position:absolute;left:8px;top:8px;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0;font-size:16px;}
  
  .mobile-action-group{
    position:absolute;right:8px;top:8px;display:flex;gap:6px;align-items:center;
  }
  .m-action-circle-btn{
    width:38px;height:38px;border-radius:50%;background:rgba(236,225,200,.95);
    border:1px solid var(--paper-edge);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);
    transition:background .2s, transform .1s;
  }
  .m-action-circle-btn:active{transform:scale(0.92);background:var(--paper-deep);}
  .m-action-circle-btn.submit-active{background:var(--jade);color:#fff;border-color:var(--jade-deep);}

  #capsule-track{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none;width:100%;}
  #capsule-track::-webkit-scrollbar{display:none;}
  .capsule{
    flex-shrink:0;font-family:var(--font-body);font-size:12.5px;font-weight:600;white-space:nowrap;
    background:rgba(236,225,200,.95);color:var(--ink);border:1px solid var(--paper-edge);
    padding:8px 14px;border-radius:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .capsule.active{background:var(--jade);color:#fff;border-color:var(--jade-deep);}

  /* ---------- Leaflet 点位标记 ---------- */
  .leaflet-div-icon{background:transparent;border:none;}
  .poi-marker{position:relative;width:36px;height:36px;cursor:pointer;}
  .poi-marker .ripple{position:absolute;inset:0;border-radius:50%;border:2px solid var(--jade);opacity:0;animation:radarPulse 2.6s ease-out infinite;}
  @keyframes radarPulse{0%{transform:scale(.55);opacity:.85;}70%{opacity:.12;}100%{transform:scale(2.7);opacity:0;}}
  .poi-marker .dot{
    position:absolute;inset:0;width:36px;height:36px;border-radius:50%;
    background:rgba(63,122,92,.62);border:2px solid #fff;z-index:2;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:11px;font-weight:700;color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.65);
  }

  /* ---------- 底部多媒体抽屉 ---------- */
  #drawer{
    position:fixed;left:0;right:0;bottom:0;max-height:75vh;z-index:500;
    background:var(--paper);border-radius:18px 18px 0 0;
    box-shadow:0 -12px 36px rgba(0,0,0,.4);
    transform:translateY(102%);transition:transform .48s cubic-bezier(.22,.61,.36,1);
    display:flex;flex-direction:column;overflow:hidden;
  }
  #drawer.open{transform:translateY(0);}
  #drawer .rod{height:18px;background:linear-gradient(180deg,var(--gold),var(--paper-edge));position:relative;flex-shrink:0;cursor:pointer;}
  #drawer .rod::before,#drawer .rod::after{content:"";position:absolute;top:1px;bottom:1px;width:9px;border-radius:5px;background:var(--gold);box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);}
  #drawer .rod::before{left:10px;} #drawer .rod::after{right:10px;}
  #drawer .rod .grip{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46px;height:5px;border-radius:3px;background:rgba(43,38,32,.35);}
  #drawer-close{position:absolute;top:24px;right:14px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(43,38,32,.65);color:#fff;font-size:15px;cursor:pointer;z-index:6;}
  #drawer-scroll{overflow-y:auto;flex:1;padding-bottom:60px;}
  .media-box{width:100%;background:#11140f;position:relative;overflow:hidden;}
  .media-box video,.media-box img{width:100%;height:100%;object-fit:cover;display:block;}

  /* 媒体 tab 条 */
  .media-tabs{display:flex;background:rgba(20,18,14,.85);position:relative;z-index:4;flex-shrink:0;}
  .media-tab{flex:1;padding:9px 0;font-size:12.5px;font-weight:700;text-align:center;cursor:pointer;
    color:rgba(255,255,255,.5);border:none;background:none;transition:.2s;letter-spacing:.5px;font-family:var(--font-body);}
  .media-tab.active{color:#fff;}
  .media-tab-ink{position:absolute;bottom:0;height:2px;background:var(--jade);transition:left .25s,width .25s;}
  .media-content{flex:1;height:42vh;max-height:280px;position:relative;overflow:hidden;}
  .media-panel{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .3s;}
  .media-panel.active{opacity:1;pointer-events:auto;}
  .media-box.no-tabs .media-content{height:42vh;max-height:280px;}

  /* 图片滚动播放 */
  .media-carousel{position:relative;width:100%;height:100%;}
  .media-carousel .c-slide{position:absolute;inset:0;opacity:0;transition:opacity .7s ease;}
  .media-carousel .c-slide.active{opacity:1;}
  .c-dots{position:absolute;left:0;right:0;bottom:12px;display:flex;justify-content:center;gap:6px;z-index:3;}
  .c-dots .c-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:.2s;border:none;padding:0;}
  .c-dots .c-dot.active{background:#fff;width:18px;border-radius:4px;}
  .c-arrow{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;
    background:rgba(20,18,14,.45);color:#fff;border:none;font-size:13px;cursor:pointer;z-index:3;
    display:flex;align-items:center;justify-content:center;}
  .c-arrow.c-prev{left:10px;} .c-arrow.c-next{right:10px;}
  .c-fullscreen{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:7px;z-index:4;
    background:rgba(20,18,14,.55);color:#fff;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  /* ---------- 互动留言板结构美化 ---------- */
  .comment-section{
    margin-top:24px;border-top:1px dashed var(--paper-edge);padding-top:20px;
  }
  .comment-section h3{font-size:16px;font-weight:700;margin:0 0 14px;color:var(--ink);display:flex;align-items:center;gap:6px;}
  .comment-form{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
  .comment-form textarea{
    width:100%;padding:10px 12px;border:1px solid var(--paper-edge);border-radius:var(--radius-md);
    background:#fbf6ea;font-family:var(--font-body);font-size:13px;resize:none;height:64px;transition:all .2s;
  }
  .comment-form textarea:focus{outline:2px solid var(--jade);background:#fff;}
  .comment-form-meta{display:flex;justify-content:space-between;align-items:center;}
  .comment-user-hint{font-size:11.5px;color:#6b6048;}
  .comment-submit-btn{
    padding:6px 14px;font-size:12px;font-weight:700;background:var(--jade);color:#fff;
    border:none;border-radius:14px;cursor:pointer;transition:.2s;font-family:var(--font-body);
  }
  .comment-submit-btn:hover{background:var(--jade-deep);}
  .comment-list{display:flex;flex-direction:column;gap:10px;}
  .comment-item{
    background:rgba(255,255,255,.4);border:1px solid rgba(184,145,90,.15);
    border-radius:var(--radius-md);padding:10px 12px;box-shadow:var(--shadow-sm);
    animation:fadeInUp .3s ease;
  }
  @keyframes fadeInUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .comment-item-header{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px;}
  .comment-item-user{font-weight:700;color:var(--jade-deep);}
  .comment-item-time{color:#9c8a63;font-family:var(--font-mono);}
  .comment-item-body{font-size:13px;line-height:1.5;color:var(--ink);white-space:pre-wrap;}
  .comment-empty{text-align:center;padding:16px;font-size:12.5px;color:#9c8a63;font-style:italic;}

  /* ---------- 全屏灯箱 ---------- */
  #lightbox{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.96);display:none;align-items:center;justify-content:center;flex-direction:column;}
  #lightbox.show{display:flex;}
  #lightbox-img{max-width:100vw;max-height:85vh;object-fit:contain;}
  #lightbox-close{position:absolute;top:16px;right:18px;background:rgba(255,255,255,.12);border:none;color:#fff;font-size:20px;width:38px;height:38px;border-radius:50%;cursor:pointer;}

  /* ---------- 后台与前端通用表单美化 ---------- */
  .gallery-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;}
  .gallery-thumb{position:relative;width:54px;height:54px;border-radius:8px;overflow:hidden;border:1px solid var(--paper-edge);}
  .gallery-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .gallery-thumb .g-remove{position:absolute;top:1px;right:1px;width:17px;height:17px;border-radius:50%;background:rgba(20,18,14,.72);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

  #vr-pane{display:none;position:relative;width:100%;height:62vh;background:#000;overflow:hidden;}
  #drawer.vr-mode #vr-pane{display:block;}
  #drawer.vr-mode #drawer-scroll > .media-box, #drawer.vr-mode #drawer-scroll > .drawer-body{display:none;}
  #vr-canvas-wrap{position:absolute;inset:0;}
  #vr-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9498a3;background:#000;z-index:3;}
  #vr-back-btn{position:absolute;top:14px;left:14px;z-index:6;background:rgba(20,18,14,.65);color:#fff;border:none;border-radius:18px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
  #vr-scene-strip{position:absolute;left:0;right:0;bottom:0;z-index:6;display:flex;gap:7px;overflow-x:auto;padding:10px 14px;background:linear-gradient(0deg,rgba(0,0,0,.65),transparent);}
  .vchip{flex-shrink:0;font-size:11.5px;font-weight:600;color:#fff;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:14px;cursor:pointer;}
  .vchip.active{background:var(--jade);border-color:var(--jade-deep);}

  .toggle-pill{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:14px;border:none;cursor:pointer;}
  .toggle-pill.on{background:var(--jade-soft);color:var(--jade-deep);}
  .toggle-pill.off{background:rgba(156,59,44,.12);color:var(--seal);}

  .hp-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;overflow:hidden;cursor:pointer;transition:.2s;}
  .hp-card:hover{border-color:var(--jade);transform:translateY(-2px);}
  .hp-card img{width:100%;height:110px;object-fit:cover;display:block;}
  .hp-card .hpc-body{padding:10px 12px;}
  .hp-card .hpc-name{font-size:14px;font-weight:700;color:#f1e8cf;}

  .member-btn{font-family:var(--font-body);font-size:14px;font-weight:600;padding:13px 28px;border-radius:50px;border:1.5px solid rgba(184,145,90,.6);color:rgba(241,232,207,.8);background:rgba(184,145,90,.12);cursor:pointer;}
  .member-btn.logged-in{border-color:var(--jade);color:#b5f5d8;background:rgba(63,122,92,.2);}
  #member-bar{padding:12px 16px;border-bottom:1px solid var(--gold-soft);display:none;background:rgba(184,145,90,.05);}
  #member-bar.show{display:block;}
  #member-bar .mb-email{font-size:12px;color:#6b6048;margin-bottom:8px;font-weight:600;}
  #member-bar .mb-actions{display:flex;gap:7px;flex-wrap:wrap;}
  .mb-btn{font-size:11.5px;font-weight:600;padding:7px 12px;border-radius:14px;border:none;cursor:pointer;font-family:var(--font-body);}
  .mb-btn.primary{background:var(--jade-soft);color:var(--jade-deep);}
  .mb-btn.primary:hover{background:var(--jade);color:#fff;}
  .mb-btn.ghost{background:transparent;color:#8a7a5c;border:1px solid var(--paper-edge);}
  
  #submit-mode-bar{position:fixed;top:0;left:0;right:0;z-index:450;background:var(--jade);color:#fff;font-family:var(--font-body);font-size:13px;font-weight:600;display:none;align-items:center;justify-content:center;gap:12px;padding:10px 16px;}
  #submit-mode-bar.show{display:flex;}
  #submit-mode-bar button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:5px 12px;border-radius:12px;cursor:pointer;}
  #review-badge{position:static;background:var(--seal);color:#fff;border-radius:8px;font-size:10px;font-weight:700;padding:1px 6px;display:none;margin-left:4px;}
  #review-panel{border-top:1px solid var(--gold-soft);padding:10px 14px;display:none;max-height:340px;overflow-y:auto;}
  #review-panel.show{display:block;}
  
  /* 审核卡片美化 */
  .sub-card{background:rgba(255,255,255,.5);border-radius:var(--radius-md);padding:12px;margin-bottom:10px;border:1px solid var(--paper-edge);box-shadow:var(--shadow-sm);}
  .sub-card .sc-name{font-weight:700;font-size:14px;}
  .sub-card .sc-meta{font-size:11px;color:#6b6048;margin-bottom:6px;}
  .sub-card .sc-story{font-size:12.5px;color:#3a342b;margin-bottom:8px;background:rgba(0,0,0,.03);padding:6px;border-radius:6px;}
  .sub-card .sc-actions{display:flex;gap:7px;margin-top:8px;}
  .sc-btn{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:8px;border:none;cursor:pointer;}
  .sc-btn.approve{background:var(--jade);color:#fff;}
  .sc-btn.reject{background:transparent;color:var(--seal);border:1px solid var(--seal);}
  .sc-btn.locate{background:var(--jade-soft);color:var(--jade-deep);}
  
  .my-sub-item{padding:12px 0;border-bottom:1px solid var(--gold-soft);}
  .my-sub-item .ms-name{font-weight:700;font-size:14px;}
  .my-sub-item .ms-status{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;}
  .ms-status.pending{background:rgba(224,162,60,.18);color:#b87d1a;}
  .ms-status.approved{background:rgba(63,122,92,.16);color:var(--jade-deep);}
  .ms-status.rejected{background:rgba(156,59,44,.12);color:var(--seal);}

  .drawer-body{padding:18px 22px 26px;}
  .drawer-body h2{font-size:22px;margin:4px 0 12px;font-weight:700;letter-spacing:0.5px;}
  .drawer-body .story{font-size:14.5px;line-height:1.8;color:#3a342b;margin-bottom:18px;}

}).addTo(map);

const markerLayer = L.layerGroup().addTo(map);

function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function toast(msg){
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer); t._timer = setTimeout(()=>t.classList.remove("show"), 2600);
}

async function fetchPois(){
  if(sb){
    try{
      const { data } = await sb.from("pois").select("*").order("sort_order", { ascending:true });
      return data || [];
    }catch(e){ return []; }
  }
  return [];
}

function renderAll(){
  markerLayer.clearLayers();
  renderMarkers();
  renderSidebarList();
  renderCapsules();
}

function renderMarkers(){
  pois.forEach(p => {
    const icon = L.divIcon({
      className: "",
      html: `<div class="poi-marker"><div class="ripple"></div><div class="dot">${String(p.display_num||p.poi_id).padStart(3,"0")}</div></div>`,
      iconSize: [36,36], iconAnchor: [18,18]
    });
    const m = L.marker([p.lat, p.lng], { icon }).addTo(markerLayer);
    m.on("click", () => focusPoi(p.poi_id));
  });
}

function renderSidebarList(){
  const ul = document.getElementById("ranking-list");
  ul.innerHTML = pois.map(p => `
    <li data-id="${p.poi_id}">
      <span class="num">${String(p.display_num||p.poi_id).padStart(3,"0")}</span>
      <span class="name">${escapeHtml(p.name)}</span>
      ${adminMode ? `<span class="li-actions"><span class="li-del" onclick="deletePoi(${p.poi_id},event)">✕</span></span>` : ""}
    </li>`).join("");
}

function renderCapsules(){
  const track = document.getElementById("capsule-track");
  track.innerHTML = pois.map(p => `<button class="capsule" data-id="${p.poi_id}">#${p.name}</button>`).join("");
  track.querySelectorAll(".capsule").forEach(b => b.addEventListener("click", () => focusPoi(Number(b.dataset.id))));
}

function focusPoi(id){
  const p = pois.find(x => x.poi_id === id);
  if(!p) return;
  map.flyTo([p.lat, p.lng], 15);
  openDrawer(p);
}

function openDrawer(p){
  currentDrawerPoiId = p.poi_id;
  document.getElementById("drawer-num").textContent = "NO. " + String(p.display_num||p.poi_id).padStart(3,"0");
  document.getElementById("drawer-era").textContent = p.era;
  document.getElementById("drawer-name").textContent = p.name;
  document.getElementById("drawer-story").textContent = p.story;
  
  const mediaBox = document.getElementById("media-box");
  if(p.video_url){
    mediaBox.innerHTML = `<video src="${p.video_url}" controls style="width:100%;max-height:240px;background:#000;"></video>`;
  }else if(p.cover){
    mediaBox.innerHTML = `<img src="${p.cover}" style="width:100%;max-height:240px;object-fit:cover;">`;
  }else{
    mediaBox.innerHTML = `<div style="padding:40px;text-align:center;color:#6b6048;">暂无多媒体信息</div>`;
  }

  document.getElementById("btn-nav").onclick = () => {
    window.location.href = `https://uri.amap.com/navigation?to=${p.lng},${p.lat},${encodeURIComponent(p.name)}&mode=car&policy=1&callnative=1`;
  };

  // 展开抽屉时同步加载当前点位的留言
  loadComments(p.poi_id);

  const drawer = document.getElementById("drawer");
  drawer.classList.add("open");
  drawer.setAttribute("aria-hidden","false");
}

function closeDrawer(){
  document.getElementById("drawer").classList.remove("open");
  currentDrawerPoiId = null;
}
document.getElementById("drawer-close").addEventListener("click", closeDrawer);

/* ==================== 核心逻辑需求 1：互动留言板 ==================== */
async function loadComments(poiId) {
  const container = document.getElementById("drawer-comments-list");
  if (!sb) return;
  
  const { data, error } = await sb.from("poi_comments")
    .select("*")
    .eq("poi_id", poiId)
    .order("created_at", { ascending: false });

  if (error || !data || data.length === 0) {
    container.innerHTML = `<div class="comment-empty">暂无留言，快来抢沙发吧！</div>`;
    return;
  }

  container.innerHTML = data.map(c => {
    const timeStr = new Date(c.created_at).toLocaleString("zh-CN", {hour12:false});
    return `
      <div class="comment-item">
        <div class="comment-item-header">
          <span class="comment-item-user">${escapeHtml(c.user_email.split('@')[0])}</span>
          <span class="comment-item-time">${timeStr}</span>
        </div>
        <div class="comment-item-body">${escapeHtml(c.content)}</div>
      </div>`;
  }).join("");
}

document.getElementById("comment-form-panel").addEventListener("submit", async (e) => {
  e.preventDefault();
  if(!currentDrawerPoiId){ toast("未选中有效考证位置"); return; }
  
  const textarea = document.getElementById("c-text");
  const content = textarea.value.trim();
  if(!content) return;

  const email = memberUser ? memberUser.email : "anonymous@visitor.com";

  if(sb) {
    const { error } = await sb.from("poi_comments").insert({
      poi_id: currentDrawerPoiId,
      user_email: email,
      content: content
    });

    if(error){ toast("发表留言失败"); }
    else {
      toast("留言发表成功 ✓");
      textarea.value = "";
      loadComments(currentDrawerPoiId);
    }
  } else {
    toast("演示模式：无法连接到云数据库");
  }
});


/* ==================== 会员与权限状态处理 ==================== */
function openMemberLogin(){
  if(memberMode){ openMySubmissions(); return; }
  document.getElementById("member-overlay").classList.add("show");
}
function closeMemberModal(){ document.getElementById("member-overlay").classList.remove("show"); }
function showMemberRegister(){
  document.getElementById("member-login-view").style.display = "none";
  document.getElementById("member-register-view").style.display = "block";
}
function showMemberLogin(){
  document.getElementById("member-login-view").style.display = "block";
  document.getElementById("member-register-view").style.display = "none";
}

document.getElementById("member-login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("m-email").value.trim();
  const pass = document.getElementById("m-pass").value;
  if(!sb) return;

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error){ document.getElementById("m-login-err").textContent = error.message; return; }
  
  closeMemberModal();
  if(email.toLowerCase() === ADMIN_EMAIL.toLowerCase()){
    setAdminMode(true);
  }else{
    setMemberMode(true, { email });
  }
});

document.getElementById("member-register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("r-email").value.trim();
  const pass = document.getElementById("r-pass").value;
  if(!sb) return;
  const { error } = await sb.auth.signUp({ email, password: pass });
  if(error){ document.getElementById("m-reg-err").textContent = error.message; return; }
  closeMemberModal();
  toast("注册成功，请登录");
});

function setMemberMode(on, user){
  memberMode = on; memberUser = user;
  document.getElementById("member-bar").classList.toggle("show", on);
  if(on) {
    document.getElementById("member-email-label").textContent = "👤 " + user.email;
    document.getElementById("comment-user-label").textContent = "会员: " + user.email.split('@')[0];
  }
  
  // 需求优化 2：移动端根据登录状态展示/隐藏对应的控制部件
  document.getElementById("m-action-submit-btn").style.display = on ? "flex" : "none";
  document.getElementById("sb-member-btn").style.display = on ? "none" : "block";
  document.getElementById("hp-member-btn").textContent = on ? "👤 会员管理" : "👤 会员中心";
}

function memberLogout(){
  setMemberMode(false, null);
  setAdminMode(false);
  toast("已安全退出");
}

function setAdminMode(on){
  adminMode = on;
  document.getElementById("admin-controls").style.display = on ? "flex" : "none";
  document.getElementById("review-section").style.display = on ? "block" : "none";
  if(on) {
    map.on("click", onMapClickAdmin);
    loadPendingSubmissions();
  }
  renderSidebarList();
}

/* ==================== 核心需求 3：普通会员开放视频提交 ==================== */
let submitMode = false;
function startSubmitMode(){
  if(!memberMode){ openMemberLogin(); return; }
  submitMode = true;
  document.getElementById("submit-mode-bar").classList.add("show");
  // 手机端投稿高亮反馈
  document.getElementById("m-action-submit-btn").classList.add("submit-active");
  showMapView();
  map.on("click", onMapClickSubmit);
  toast("请在地图上单击合适位置");
}

function cancelSubmitMode(){
  submitMode = false;
  document.getElementById("submit-mode-bar").classList.remove("show");
  document.getElementById("m-action-submit-btn").classList.remove("submit-active");
  map.off("click", onMapClickSubmit);
}

function onMapClickSubmit(e){
  pendingLatLng = e.latlng;
  cancelSubmitMode();
  document.getElementById("submit-coords").textContent = `纬度 ${e.latlng.lat.toFixed(6)} · 经度 ${e.latlng.lng.toFixed(6)}`;
  document.getElementById("submit-form").reset();
  document.getElementById("submit-overlay").classList.add("show");
}

function closeSubmitForm(){ document.getElementById("submit-overlay").classList.remove("show"); }

// 云存储公共上传接口
async function uploadToStorage(file, folder){
  if(!sb) return { error: "未连接" };
  const path = `${folder}/${Date.now()}_${file.name}`;
  const { error } = await sb.storage.from("poi-media").upload(path, file);
  if(error) return { error: error.message };
  const { data } = sb.storage.from("poi-media").getPublicUrl(path);
  return { url: data.publicUrl };
}

// 绑定普通会员文件上传逻辑（支持图片与短视频）
document.getElementById("s-cover-file").addEventListener("change", async (e) => {
  const file = e.target.files[0]; if(!file) return;
  const status = document.getElementById("s-cover-status"); status.textContent = "上传中…";
  const { url } = await uploadToStorage(file, "submissions");
  if(url){ document.getElementById("s-cover").value = url; status.textContent = "✓ 上传完成"; status.className="upload-status ok"; }
});

document.getElementById("s-video-file").addEventListener("change", async (e) => {
  const file = e.target.files[0]; if(!file) return;
  const status = document.getElementById("s-video-status"); status.textContent = "视频处理中…";
  const { url } = await uploadToStorage(file, "submissions_video");
  if(url){ document.getElementById("s-video").value = url; status.textContent = "✓ 视频配置成功"; status.className="upload-status ok"; }
});

document.getElementById("submit-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  if(!sb || !memberUser) return;
  
  const payload = {
    user_id: sb.auth.getUser()?.id || "member_user",
    user_email: memberUser.email,
    name: document.getElementById("s-name").value.trim(),
    lat: pendingLatLng.lat, lng: pendingLatLng.lng,
    era: document.getElementById("s-era").value,
    story: document.getElementById("s-story").value.trim(),
    cover: document.getElementById("s-cover").value.trim() || null,
    video_url: document.getElementById("s-video").value.trim() || null, // 投稿写入视频信息
    status: "pending"
  };

  const { error } = await sb.from("user_submissions").insert(payload);
  if(error){ toast("提交失败"); }
  else { closeSubmitForm(); toast("✓ 投稿成功！请等待平台管理员审核。"); }
});

/* ==================== 管理员后端点位打点与审核 ==================== */
function onMapClickAdmin(e){
  editingPoiId = null; pendingLatLng = e.latlng;
  document.getElementById("point-coords").textContent = `纬度 ${e.latlng.lat.toFixed(6)} · 经度 ${e.latlng.lng.toFixed(6)}`;
  document.getElementById("point-form").reset();
  document.getElementById("point-overlay").classList.add("show");
}

document.getElementById("point-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  if(!sb) return;
  const nextId = pois.length ? Math.max(...pois.map(p=>p.poi_id)) + 1 : 1;
  const payload = {
    poi_id: nextId, sort_order: nextId,
    name: document.getElementById("p-name").value,
    lat: pendingLatLng.lat, lng: pendingLatLng.lng,
    era: document.getElementById("p-era").value,
    story: document.getElementById("p-story").value,
    cover: document.getElementById("p-cover").value,
    video_url: document.getElementById("p-video").value,
    level: Number(document.getElementById("p-level").value)
  };
  await sb.from("pois").insert(payload);
  document.getElementById("point-overlay").classList.remove("show");
  pois = await fetchPois(); renderAll();
});

let reviewPanelOpen = false;
function toggleReviewPanel(){
  reviewPanelOpen = !reviewPanelOpen;
  document.getElementById("review-panel").classList.toggle("show", reviewPanelOpen);
}

async function loadPendingSubmissions(){
  if(!sb) return;
  const { data } = await sb.from("user_submissions").select("*").eq("status", "pending");
  const badge = document.getElementById("review-badge");
  badge.textContent = data ? data.length : 0;
  badge.style.display = data && data.length ? "inline-block" : "none";

  if(reviewPanelOpen && data){
    const panel = document.getElementById("review-panel");
    panel.innerHTML = data.map(s => `
      <div class="sub-card">
        <div class="sc-name">${escapeHtml(s.name)}</div>
        <div class="sc-meta">${s.era} · ${s.user_email}</div>
        <div class="sc-story">${escapeHtml(s.story)}</div>
        ${s.video_url ? `<div style="font-size:11px;color:var(--jade-deep);">附带视频资料 🎬</div>` : ""}
        <div class="sc-actions">
          <button class="sc-btn locate" onclick="map.flyTo([${s.lat},${s.lng}],16)">定位</button>
          <button class="sc-btn approve" onclick="approveSub(${s.id})">通过</button>
        </div>
      </div>`).join("");
  }
}

async function approveSub(id){
  const { data: sub } = await sb.from("user_submissions").select("*").eq("id", id).single();
  if(!sub) return;
  const nextId = pois.length ? Math.max(...pois.map(p=>p.poi_id)) + 1 : 1;
  
  await sb.from("pois").insert({
    poi_id: nextId, sort_order: nextId, name: sub.name, lat: sub.lat, lng: sub.lng,
    era: sub.era, story: sub.story, cover: sub.cover, video_url: sub.video_url
  });
  await sb.from("user_submissions").update({ status: "approved" }).eq("id", id);
  toast("点位审核通过并已上线");
  pois = await fetchPois(); renderAll(); loadPendingSubmissions();
}

async function openMySubmissions(){
  document.getElementById("my-submissions-overlay").classList.add("show");
  const list = document.getElementById("my-submissions-list");
  list.innerHTML = "加载中...";
  if(!sb) return;
  const { data } = await sb.from("user_submissions").select("*").order("created_at", { ascending: false });
  if(!data || !data.length){ list.innerHTML = "<p>暂无投稿记录</p>"; return; }
  list.innerHTML = data.map(s => `
    <div class="my-sub-item">
      <div class="ms-name">${escapeHtml(s.name)}</div>
      <span class="ms-status ${s.status}">${s.status==='pending'?'⏳ 审核中':'✓ 已上线'}</span>
    </div>`).join("");
}

function showMapView(){ document.getElementById("homepage").style.display = "none"; }

// 侧栏移动展开开关
document.getElementById("sidebar-toggle").addEventListener("click", () => {
  document.getElementById("sidebar").classList.toggle("open");
});

(async function init(){
  if(window.supabase) {
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
  pois = await fetchPois();
  renderAll();
  document.getElementById("homepage").style.display = "block";
})();
</script>
