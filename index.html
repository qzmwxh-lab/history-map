<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>拓荒者足迹 · 数字化智慧文旅历史轨迹</title>
<link rel="preconnect" href="https://fonts.font.im">
<link href="https://fonts.font.im/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --ink:#2b2620;
    --paper:#ece1c8;
    --paper-deep:#d9c79f;
    --paper-edge:#c4b186;
    --jade:#3f7a5c;
    --jade-deep:#2c5841;
    --jade-soft:rgba(63,122,92,.16);
    --seal:#9c3b2c;
    --qing:#6b4423;
    --republic:#335c82;
    --modern:#3a7d5c;
    --gold:#b8915a;
    --gold-soft:rgba(184,145,90,.4);
    --font-display:'Ma Shan Zheng', cursive;
    --font-body:'Noto Serif SC', serif;
    --font-mono:'Roboto Mono', monospace;
    --sidebar-w:330px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;font-family:var(--font-body);color:var(--ink);}
  body{overflow:hidden;}
  #map{position:absolute;inset:0;z-index:1;background:#cfd6cf;}

  /* ---------- 左侧常驻侧栏（电脑端） ---------- */
  #sidebar{
    position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);
    background:linear-gradient(180deg,var(--paper) 0%, var(--paper-deep) 100%);
    border-right:1px solid var(--paper-edge);
    box-shadow:6px 0 24px rgba(0,0,0,.18);
    z-index:400;display:flex;flex-direction:column;
    transform:translateX(0);transition:transform .5s cubic-bezier(.22,.61,.36,1);
    animation:slideInLeft .6s cubic-bezier(.22,.61,.36,1);
  }
  @keyframes slideInLeft{from{transform:translateX(-100%);}to{transform:translateX(0);}}
  #sidebar .sb-header{padding:26px 22px 16px;border-bottom:1px solid var(--gold-soft);position:relative;}
  #sidebar .sb-header::after{content:"";position:absolute;left:22px;right:22px;bottom:-1px;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
  #sidebar h1{font-family:var(--font-display);font-size:34px;line-height:1;margin:0 0 6px;color:var(--ink);letter-spacing:1px;}
  #sidebar .sb-sub{font-size:12px;letter-spacing:3px;color:#6b6048;margin:0 0 16px;display:flex;align-items:center;gap:6px;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#b4a276;flex-shrink:0;}
  .sync-dot.live{background:var(--jade);animation:pulseGlow 1.8s ease-in-out infinite;}
  .login-btn{
    font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:1px;
    border:1px solid var(--jade-deep);background:var(--jade-soft);color:var(--jade-deep);
    padding:9px 16px;border-radius:20px;cursor:pointer;transition:.25s;display:inline-flex;align-items:center;gap:6px;
  }
  .login-btn:hover{background:var(--jade);color:#fff;}
  .login-btn.admin-on{
    background:var(--jade-deep);color:#eaffef;border-color:var(--jade-deep);
    animation:pulseGlow 1.6s ease-in-out infinite;
  }
  @keyframes pulseGlow{0%,100%{box-shadow:0 0 0 0 rgba(63,122,92,.55);}50%{box-shadow:0 0 0 8px rgba(63,122,92,0);}}

  #ranking-wrap{flex:1;overflow-y:auto;padding:10px 0 16px;}
  #ranking-wrap::-webkit-scrollbar{width:5px;}
  #ranking-wrap::-webkit-scrollbar-thumb{background:var(--gold-soft);border-radius:3px;}
  #ranking-list{list-style:none;margin:0;padding:0;}
  #ranking-list li{
    display:flex;align-items:center;gap:12px;padding:13px 22px;cursor:pointer;
    border-bottom:1px solid rgba(184,145,90,.18);transition:background .2s;
  }
  #ranking-list li:hover, #ranking-list li.active{background:rgba(63,122,92,.1);}
  #ranking-list li.dragging{opacity:.35;}
  #ranking-list li.drag-over{box-shadow:inset 0 2px 0 0 var(--jade);}
  #ranking-list li[draggable="true"]{cursor:grab;}
  #ranking-list .drag-handle{color:#9c8a63;font-size:13px;cursor:grab;flex-shrink:0;}
  #ranking-list .num{font-family:var(--font-mono);font-size:12px;color:#8a7a5c;min-width:30px;}
  #ranking-list .name{flex:1;font-size:15px;font-weight:600;}
  #ranking-list .era-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  #ranking-list .li-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s;}
  #ranking-list li:hover .li-actions{opacity:1;}
  #ranking-list .li-edit,#ranking-list .li-del{
    width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;
    font-size:12.5px;cursor:pointer;flex-shrink:0;
  }
  #ranking-list .li-edit{color:var(--jade-deep);} #ranking-list .li-edit:hover{background:var(--jade-soft);}
  #ranking-list .li-del{color:var(--seal);} #ranking-list .li-del:hover{background:rgba(156,59,44,.14);}
  .relocate-hint{font-size:11.5px;color:var(--jade-deep);background:var(--jade-soft);padding:7px 10px;border-radius:7px;margin:-4px 0 12px;}
  .era-qing{background:var(--qing);} .era-republic{background:var(--republic);} .era-modern{background:var(--modern);} .era-other{background:#8a7a5c;}
  #sidebar .demo-banner{margin:0 22px 14px;padding:8px 12px;background:rgba(156,59,44,.1);border:1px dashed var(--seal);border-radius:8px;font-size:11px;color:var(--seal);line-height:1.5;}

  /* ---------- 手机端胶囊标签 ---------- */
  #mobile-bar{display:none;position:fixed;top:0;left:0;right:0;z-index:400;padding:10px 10px 10px 56px;gap:8px;align-items:center;}
  #mobile-bar .login-btn-m{position:absolute;left:8px;top:8px;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0;font-size:16px;}
  #capsule-track{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 6px;scrollbar-width:none;}
  #capsule-track::-webkit-scrollbar{display:none;}
  .capsule{
    flex-shrink:0;font-family:var(--font-body);font-size:12.5px;font-weight:600;white-space:nowrap;
    background:rgba(236,225,200,.95);color:var(--ink);border:1px solid var(--paper-edge);
    padding:8px 14px;border-radius:20px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);
  }
  .capsule.active{background:var(--jade);color:#fff;border-color:var(--jade-deep);}

  /* ---------- Leaflet 点位标记 ---------- */
  .leaflet-div-icon{background:transparent;border:none;}
  .poi-marker{position:relative;width:36px;height:36px;cursor:pointer;}
  .poi-marker .ripple{position:absolute;inset:0;border-radius:50%;border:2px solid var(--jade);opacity:0;animation:radarPulse 2.6s ease-out infinite;}
  @keyframes radarPulse{0%{transform:scale(.55);opacity:.85;}70%{opacity:.12;}100%{transform:scale(2.7);opacity:0;}}
  .poi-marker .dot{
    position:absolute;inset:0;width:36px;height:36px;border-radius:50%;
    background:rgba(63,122,92,.62);border:2px solid #fff;z-index:2;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--font-mono);font-size:11px;font-weight:700;color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.65);
  }

  /* ---------- 底部多媒体抽屉（拓本卷轴风格） ---------- */
  #drawer{
    position:fixed;left:0;right:0;bottom:0;max-height:60vh;z-index:500;
    background:var(--paper);border-radius:18px 18px 0 0;
    box-shadow:0 -12px 36px rgba(0,0,0,.4);
    transform:translateY(102%);transition:transform .48s cubic-bezier(.22,.61,.36,1);
    display:flex;flex-direction:column;overflow:hidden;
  }
  #drawer.open{transform:translateY(0);}
  #drawer .rod{height:18px;background:linear-gradient(180deg,var(--gold),var(--paper-edge));position:relative;flex-shrink:0;cursor:pointer;}
  #drawer .rod::before,#drawer .rod::after{content:"";position:absolute;top:1px;bottom:1px;width:9px;border-radius:5px;background:var(--gold);box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);}
  #drawer .rod::before{left:10px;} #drawer .rod::after{right:10px;}
  #drawer .rod .grip{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46px;height:5px;border-radius:3px;background:rgba(43,38,32,.35);}
  #drawer-close{position:absolute;top:24px;right:14px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(43,38,32,.65);color:#fff;font-size:15px;cursor:pointer;z-index:6;}
  #drawer-scroll{overflow-y:auto;flex:1;}
  .media-box{width:100%;height:42vh;max-height:280px;background:#11140f;position:relative;overflow:hidden;}
  .media-box video,.media-box img{width:100%;height:100%;object-fit:cover;display:block;}
  .media-box video{outline:none;}

  /* ---------- 图片滚动播放（多图轮播） ---------- */
  .media-carousel{position:relative;width:100%;height:100%;}
  .media-carousel .c-slide{position:absolute;inset:0;opacity:0;transition:opacity .7s ease;}
  .media-carousel .c-slide.active{opacity:1;}
  .media-carousel .c-slide img{width:100%;height:100%;object-fit:cover;display:block;}
  .c-dots{position:absolute;left:0;right:0;bottom:12px;display:flex;justify-content:center;gap:6px;z-index:3;}
  .c-dots .c-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);cursor:pointer;transition:.2s;border:none;padding:0;}
  .c-dots .c-dot.active{background:#fff;width:18px;border-radius:4px;}
  .c-arrow{position:absolute;top:50%;transform:translateY(-50%);width:30px;height:30px;border-radius:50%;
    background:rgba(20,18,14,.45);color:#fff;border:none;font-size:13px;cursor:pointer;z-index:3;
    display:flex;align-items:center;justify-content:center;}
  .c-arrow:hover{background:rgba(20,18,14,.72);}
  .c-arrow.c-prev{left:10px;} .c-arrow.c-next{right:10px;}

  /* ---------- 后台表单：图片集上传 ---------- */
  .gallery-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;}
  .gallery-thumb{position:relative;width:54px;height:54px;border-radius:8px;overflow:hidden;border:1px solid var(--paper-edge);flex-shrink:0;}
  .gallery-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .gallery-thumb .g-remove{position:absolute;top:1px;right:1px;width:17px;height:17px;border-radius:50%;
    background:rgba(20,18,14,.72);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

  /* ---------- 抽屉内嵌全景模式（VR） ---------- */
  #drawer.vr-mode{max-height:92vh;}
  #vr-pane{display:none;position:relative;width:100%;height:62vh;background:#000;overflow:hidden;}
  #drawer.vr-mode #vr-pane{display:block;}
  #drawer.vr-mode #drawer-scroll > .media-box,
  #drawer.vr-mode #drawer-scroll > .drawer-body{display:none;}
  #vr-canvas-wrap{position:absolute;inset:0;}
  #vr-canvas-wrap canvas{display:block;width:100%;height:100%;}
  #vr-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#9498a3;font-family:var(--font-mono);font-size:12.5px;background:#000;z-index:3;}
  #vr-loading.hide{display:none;}
  #vr-back-btn{position:absolute;top:14px;left:14px;z-index:6;background:rgba(20,18,14,.65);color:#fff;border:none;
    border-radius:18px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:var(--font-body);
    display:flex;align-items:center;gap:5px;}
  #vr-scene-strip{position:absolute;left:0;right:0;bottom:0;z-index:6;display:flex;gap:7px;overflow-x:auto;
    padding:10px 14px;background:linear-gradient(0deg,rgba(0,0,0,.65),transparent);scrollbar-width:none;}
  #vr-scene-strip::-webkit-scrollbar{display:none;}
  #vr-scene-strip .vchip{flex-shrink:0;font-size:11.5px;font-weight:600;color:#fff;background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:14px;cursor:pointer;white-space:nowrap;}
  #vr-scene-strip .vchip.active{background:var(--jade);border-color:var(--jade-deep);}
  #vr-hint{position:absolute;top:14px;right:14px;z-index:6;color:rgba(255,255,255,.55);font-size:11px;font-family:var(--font-mono);}
  #vr-tooltip{position:fixed;z-index:560;background:rgba(20,18,14,.9);color:#fff;border-radius:9px;padding:8px 12px;
    font-size:12px;max-width:220px;pointer-events:none;display:none;}
  #vr-tooltip.show{display:block;}
  #vr-tooltip .vt-title{font-weight:700;margin-bottom:2px;}
  .drawer-body{padding:18px 22px 26px;}
  .drawer-body .num-era{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .drawer-body .era-tag{font-family:var(--font-mono);font-size:11px;letter-spacing:1px;padding:3px 9px;border-radius:10px;color:#fff;}
  .drawer-body h2{font-size:21px;margin:2px 0 12px;font-weight:700;}
  .drawer-body .story{font-size:14.5px;line-height:1.85;color:#3a342b;margin:0 0 18px;white-space:pre-wrap;}
  .audio-block{display:flex;align-items:center;gap:10px;background:var(--jade-soft);border-radius:12px;padding:10px 14px;margin-bottom:18px;}
  .audio-block audio{flex:1;height:32px;}
  .audio-block .audio-label{font-size:12px;color:var(--jade-deep);font-weight:600;white-space:nowrap;}
  .btn-row{display:flex;gap:12px;}
  .act-btn{flex:1;border:none;border-radius:12px;padding:13px 10px;font-family:var(--font-body);font-weight:700;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:.2s;}
  .act-btn.vr{background:var(--ink);color:#f1e8cf;}
  .act-btn.vr:hover{background:#13110e;}
  .act-btn.nav{background:var(--jade);color:#fff;}
  .act-btn.nav:hover{background:var(--jade-deep);}
  .act-btn[disabled]{opacity:.35;cursor:not-allowed;}

  /* ---------- 蒙层 + 表单弹窗（登录 / 打点） ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,18,14,.55);z-index:700;display:none;align-items:center;justify-content:center;padding:20px;}
  .overlay.show{display:flex;}
  .modal-card{background:var(--paper);border-radius:16px;width:100%;max-width:380px;padding:26px 24px;box-shadow:0 20px 60px rgba(0,0,0,.45);max-height:88vh;overflow-y:auto;}
  .modal-card h3{font-family:var(--font-display);font-size:24px;margin:0 0 18px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;font-weight:600;color:#6b6048;margin-bottom:5px;letter-spacing:.5px;}
  .field input,.field textarea,.field select{
    width:100%;padding:10px 12px;border:1px solid var(--paper-edge);border-radius:8px;
    font-family:var(--font-body);font-size:13.5px;background:#fbf6ea;color:var(--ink);
  }
  .field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--jade);outline-offset:1px;}
  .field textarea{resize:vertical;min-height:70px;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;gap:10px;margin-top:6px;}
  .btn-primary,.btn-secondary{flex:1;padding:11px;border-radius:9px;border:none;font-weight:700;font-size:13.5px;cursor:pointer;font-family:var(--font-body);}
  .btn-primary{background:var(--jade);color:#fff;} .btn-primary:hover{background:var(--jade-deep);}
  .btn-secondary{background:transparent;color:#6b6048;border:1px solid var(--paper-edge);}
  .form-err{color:var(--seal);font-size:12px;margin:-4px 0 10px;min-height:14px;}
  .coords-readout{font-family:var(--font-mono);font-size:11.5px;color:var(--jade-deep);background:var(--jade-soft);padding:6px 10px;border-radius:7px;margin-bottom:14px;}
  .upload-row{display:flex;align-items:center;gap:9px;margin-top:7px;}
  .upload-btn{font-family:var(--font-body);font-size:12px;font-weight:600;padding:7px 13px;border-radius:16px;background:var(--jade-soft);color:var(--jade-deep);border:1px solid var(--jade-deep);cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .upload-btn:hover{background:var(--jade);color:#fff;}
  .field input[type="file"]{display:none;}
  .upload-status{font-size:11px;color:#6b6048;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .upload-status.ok{color:var(--jade-deep);font-weight:600;}
  .upload-status.err{color:var(--seal);font-weight:600;}
  .cover-preview{width:40px;height:40px;border-radius:7px;object-fit:cover;flex-shrink:0;border:1px solid var(--paper-edge);display:none;}
  .cover-preview.show{display:block;}

  /* ---------- 提示条 ---------- */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#f1e8cf;
    padding:11px 20px;border-radius:24px;font-size:13px;z-index:900;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.3);}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- 响应式 ---------- */
  @media (max-width:768px){
    #sidebar{display:none;}
    #mobile-bar{display:flex;}
    .media-box{height:36vh;}
  }
  :focus-visible{outline:2px solid var(--jade);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){
    .poi-marker .ripple{animation:none;opacity:.35;}
    #sidebar{animation:none;}
    .login-btn.admin-on{animation:none;}
  }
</style>
</head>
<body>

<div id="map"></div>

<!-- 桌面侧栏 -->
<aside id="sidebar">
  <div class="sb-header">
    <h1>拓荒者足迹</h1>
    <p class="sb-sub">数字化智慧文旅历史轨迹 <span id="sync-dot" class="sync-dot" title="实时同步未连接"></span></p>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <button class="login-btn" data-login>⚿ 后台管理</button>
      <a href="/vr.html" style="font-family:var(--font-body);font-size:12px;font-weight:600;color:var(--jade-deep);background:transparent;border:1px solid var(--jade-deep);padding:8px 13px;border-radius:20px;text-decoration:none;letter-spacing:.5px;">☉ 进入环视台</a>
    </div>
  </div>
  <div id="demo-banner-slot"></div>
  <div id="ranking-wrap"><ul id="ranking-list"></ul></div>
</aside>

<!-- 移动端顶部条 -->
<div id="mobile-bar">
  <button class="login-btn login-btn-m" data-login>⚿</button>
  <div id="capsule-track"></div>
</div>

<!-- 底部多媒体抽屉 -->
<div id="drawer" aria-hidden="true">
  <div class="rod" id="drawer-handle"><div class="grip"></div></div>
  <button id="drawer-close" aria-label="关闭">✕</button>
  <div id="drawer-scroll">
    <div class="media-box" id="media-box"></div>
    <div id="vr-pane">
      <div id="vr-canvas-wrap"></div>
      <div id="vr-loading">加载全景中…</div>
      <button id="vr-back-btn">← 返回介绍</button>
      <span id="vr-hint">拖拽环视 · 滚轮缩放</span>
      <div id="vr-scene-strip"></div>
    </div>
    <div class="drawer-body">
      <div class="num-era">
        <span id="drawer-num" style="font-family:var(--font-mono);font-size:12px;color:#8a7a5c;"></span>
        <span id="drawer-era" class="era-tag"></span>
      </div>
      <h2 id="drawer-name"></h2>
      <div class="audio-block" id="audio-block" style="display:none;">
        <span class="audio-label">原声解说</span>
        <audio id="drawer-audio" controls></audio>
      </div>
      <p class="story" id="drawer-story"></p>
      <div class="btn-row">
        <button class="act-btn vr" id="btn-vr">☉ 云游 360° VR</button>
        <button class="act-btn nav" id="btn-nav">➤ 唤醒地图导航</button>
      </div>
    </div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="overlay" id="login-overlay">
  <div class="modal-card">
    <h3>主控登录</h3>
    <form id="login-form">
      <div class="field"><label>管理员邮箱</label><input type="email" id="login-email" required autocomplete="username"></div>
      <div class="field"><label>密码</label><input type="password" id="login-pass" required autocomplete="current-password"></div>
      <p class="form-err" id="login-err"></p>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" data-close-login>取消</button>
        <button type="submit" class="btn-primary">登录</button>
      </div>
    </form>
  </div>
</div>

<!-- 打点表单弹窗 -->
<div class="overlay" id="point-overlay">
  <div class="modal-card">
    <h3 id="point-modal-title">新增点位</h3>
    <div class="coords-readout" id="point-coords"></div>
    <div class="relocate-hint" id="relocate-hint" style="display:none;">📍 如需更改此点位的地图位置，<span id="relocate-btn" style="text-decoration:underline;cursor:pointer;">点此后在地图上重新点击</span></div>
    <form id="point-form">
      <div class="field"><label>地名</label><input type="text" id="p-name" required></div>
      <div class="field-row">

/* Supabase SDK 可能从备用 CDN 异步加载，这里等待最多 5 秒 */
async function waitForSupabase(maxMs = 5000){
  if(window.supabase) return true;
  const start = Date.now();
  while(Date.now() - start < maxMs){

}

/* 缺图/视频加载失败时的兜底占位图（墨纸风格 SVG，避免浏览器默认的裂图图标） */
function placeholderDataUri(label){
  const text = escapeHtml(label || "封面缺失");
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450">
    <rect width="100%" height="100%" fill="#ece1c8"/>
    <rect x="20" y="20" width="760" height="410" fill="none" stroke="#b8915a" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="50%" y="47%" font-family="serif" font-size="30" fill="#6b6048" text-anchor="middle">封面图片缺失</text>
    <text x="50%" y="58%" font-family="serif" font-size="17" fill="#9c8a63" text-anchor="middle">${text}</text>
  </svg>`;
  return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
}

/* =========================================================================
   2. 地图初始化（高德清爽路网底图，XYZ 直连，免官方 Key）
   注意：这是社区常用的非官方直连方式，免去 Key 申请流程，
   但稳定性不受高德官方保障，正式商用建议改用官方 JS API + Key。
   ========================================================================= */
const map = L.map("map", { zoomControl:false, attributionControl:false }).setView([23.36, 116.68], 13);
L.control.zoom({ position:"bottomright" }).addTo(map);
L.tileLayer("https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}", {
  subdomains:["1","2","3","4"], maxZoom:18, minZoom:3
}).addTo(map);

const markerLayer = L.layerGroup().addTo(map);
const lineLayer = L.layerGroup().addTo(map);

/* =========================================================================
   3. 状态
   ========================================================================= */
let pois = [];
let adminMode = false;
let pendingLatLng = null;
let currentDrawerPoiId = null;
/* 自己发起的写操作（打点/拖拽排序）可能在短时间内触发多条 Realtime 回执
   （比如一次排序会更新好几行），用时间窗口而非一次性标记来抑制提示，
   避免给操作者本人弹出一连串"已实时更新"的提示。 */
let suppressRealtimeToastUntil = 0;
function markSelfUpdate(windowMs = 3000){ suppressRealtimeToastUntil = Date.now() + windowMs; }

/* =========================================================================
   4. 工具函数
   ========================================================================= */
function pad(n){ return String(n).padStart(3,"0"); }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function eraStyle(era){
  switch(era){
    case "晚清": return { color:"var(--qing)", hex:"#6b4423", dash:"6,8", cls:"era-qing" };
    case "民国": return { color:"var(--republic)", hex:"#335c82", dash:null, cls:"era-republic" };
    case "现代": return { color:"var(--modern)", hex:"#3a7d5c", dash:null, cls:"era-modern" };
    default:    return { color:"#8a7a5c", hex:"#8a7a5c", dash:"2,4", cls:"era-other" };
  }
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove("show"), 2600);
}
function isIOS(){ return /iPhone|iPad|iPod/i.test(navigator.userAgent); }

/* =========================================================================
   5. 数据获取 + 渲染
   ========================================================================= */
async function fetchPois(){
  if(sb){
    try{
      const { data, error } = await sb.from("pois").select("*").order("sort_order", { ascending:true });
      if(error) throw error;
      return data || [];
    }catch(e){
      console.warn("读取 Supabase 失败，回退演示数据", e);
      toast("数据库读取失败，已显示演示数据");
      return DEMO_POIS;
    }
  }
  showDemoBanner();
  return DEMO_POIS;
}
function showDemoBanner(){
  document.getElementById("demo-banner-slot").innerHTML =
    '<div class="demo-banner">⚠ 尚未配置 Supabase，当前显示示例数据。请在脚本顶部填入 SUPABASE_URL 与 SUPABASE_ANON_KEY。</div>';
}

function renderAll(){
  markerLayer.clearLayers();
  lineLayer.clearLayers();
  renderMarkers();
  renderLines();
  renderSidebarList();
  renderCapsules();
}

function renderMarkers(){
  pois.forEach(p => {
    const icon = L.divIcon({
      className: "",
      html: `<div class="poi-marker">
               <div class="ripple"></div>
               <div class="ripple" style="animation-delay:.85s"></div>
               <div class="ripple" style="animation-delay:1.7s"></div>
               <div class="dot">${pad(p.poi_id)}</div>
             </div>`,
      iconSize: [36,36],
      iconAnchor: [18,18]
    });
    const m = L.marker([p.lat, p.lng], { icon }).addTo(markerLayer);
    m.on("click", () => focusPoi(p.poi_id));
  });
}

function renderLines(){
  // pois 数组本身已按 sort_order（讲解/动线顺序）排列，直接顺序连线即可，
  // 这样管理员拖拽调整顺序后无需改动 poi_id 编号也能改变流线走向。
  for(let i=1;i<pois.length;i++){
    const prev = pois[i-1], cur = pois[i];
    const st = eraStyle(cur.era);
    L.polyline([[prev.lat,prev.lng],[cur.lat,cur.lng]], {
      color: st.hex,
      weight: 3 + Number(cur.level||1),
      opacity: 0.85,
      dashArray: st.dash,
      lineJoin: "round"
    }).addTo(lineLayer);
  }
}

function renderSidebarList(){
  const ul = document.getElementById("ranking-list");
  ul.innerHTML = pois.map(p => {
    const st = eraStyle(p.era);
    return `<li data-id="${p.poi_id}">
      ${adminMode ? '<span class="drag-handle">⠿</span>' : ""}
      <span class="num">${pad(p.poi_id)}</span>
      <span class="name">${escapeHtml(p.name)}</span>
      <span class="era-dot ${st.cls}"></span>
      ${adminMode ? `<span class="li-actions">
        <span class="li-edit" data-edit="${p.poi_id}" title="修改">✎</span>
        <span class="li-del" data-del="${p.poi_id}" title="删除">✕</span>
      </span>` : ""}
    </li>`;
  }).join("");
  ul.querySelectorAll("li").forEach(li => {
    const id = Number(li.dataset.id);
    li.addEventListener("click", (e) => {
      if(e.target.closest(".drag-handle, .li-edit, .li-del")) return;
      focusPoi(id);
    });
    attachDragReorder(li, id);
  });
  ul.querySelectorAll("[data-edit]").forEach(btn => btn.addEventListener("click", (e) => {
    e.stopPropagation();
    const p = pois.find(x => x.poi_id === Number(btn.dataset.edit));
    if(p) openEditPoiForm(p);
  }));
  ul.querySelectorAll("[data-del]").forEach(btn => btn.addEventListener("click", (e) => {
    e.stopPropagation();
    deletePoiById(Number(btn.dataset.del));
  }));
}

async function deletePoiById(id){
  const p = pois.find(x => x.poi_id === id);
  if(!p) return;
  if(!confirm(`确定删除点位「${p.name}」吗？此操作不可恢复。`)) return;
  if(!sb){ toast("尚未配置 Supabase，无法删除"); return; }
  markSelfUpdate();
  const { error } = await sb.from("pois").delete().eq("poi_id", id);
  if(error){ toast("删除失败：" + error.message); return; }
  toast("点位已删除");
  pois = await fetchPois();
  renderAll();
  if(currentDrawerPoiId === id){ closeDrawer(); }
}

/* 主控模式下，侧栏列表支持拖拽调整"讲解/动线顺序"（sort_order），
   与点位编号（poi_id，固定不变的档案编号）解耦，调整顺序不会打乱编号体系。 */
let dragSrcId = null;
function attachDragReorder(li, id){
  if(!adminMode) return;
  li.draggable = true;
  li.addEventListener("dragstart", () => { dragSrcId = id; li.classList.add("dragging"); });
  li.addEventListener("dragend", () => li.classList.remove("dragging"));
  li.addEventListener("dragover", (e) => { e.preventDefault(); li.classList.add("drag-over"); });
  li.addEventListener("dragleave", () => li.classList.remove("drag-over"));
  li.addEventListener("drop", (e) => {
    e.preventDefault();
    li.classList.remove("drag-over");
    if(dragSrcId === null || dragSrcId === id) return;
    reorderPois(dragSrcId, id);
    dragSrcId = null;
  });
}

function reorderPois(srcId, targetId){
  const fromIdx = pois.findIndex(p => p.poi_id === srcId);
  const toIdx = pois.findIndex(p => p.poi_id === targetId);
  if(fromIdx < 0 || toIdx < 0) return;
  const [moved] = pois.splice(fromIdx, 1);
  pois.splice(toIdx, 0, moved);
  pois.forEach((p, i) => { p.sort_order = i + 1; });
  renderAll();
  persistOrder();
}

async function persistOrder(){
  if(!sb){ toast("演示模式下排序仅本地生效，未保存到数据库"); return; }
  try{
    markSelfUpdate();
    await Promise.all(pois.map(p => sb.from("pois").update({ sort_order:p.sort_order }).eq("poi_id", p.poi_id)));
    toast("讲解顺序已更新并同步给所有访客");
  }catch(e){
    console.warn(e);
    toast("排序同步失败：" + (e.message || ""));
  }
}

function renderCapsules(){
  const track = document.getElementById("capsule-track");
  track.innerHTML = pois.map(p => `<button class="capsule" data-id="${p.poi_id}">#${pad(p.poi_id)} ${escapeHtml(p.name)}</button>`).join("");
  track.querySelectorAll(".capsule").forEach(b => b.addEventListener("click", () => focusPoi(Number(b.dataset.id))));
}

function focusPoi(id){
  const p = pois.find(x => x.poi_id === id);
  if(!p) return;
  map.flyTo([p.lat,p.lng], Math.max(map.getZoom(),15), { duration:0.9 });
  document.querySelectorAll("#ranking-list li").forEach(li => li.classList.toggle("active", Number(li.dataset.id)===id));
  document.querySelectorAll(".capsule").forEach(c => c.classList.toggle("active", Number(c.dataset.id)===id));
  openDrawer(p);
}

/* =========================================================================
   6. 抽屉（半屏多媒体联动）
   ========================================================================= */
/* ---- 图片轮播（图片滚动播放）：2张及以上图片时自动启用 ---- */
let carouselTimer = null;
let carouselIndex = 0;
let carouselTotal = 0;
function stopCarouselTimer(){ clearInterval(carouselTimer); carouselTimer = null; }
function startCarouselTimer(){
  stopCarouselTimer();
  if(carouselTotal < 2) return;
  carouselTimer = setInterval(() => showCarouselSlide(carouselIndex + 1), 4500);
}
function showCarouselSlide(i){
  const box = document.getElementById("media-box");
  const slides = box.querySelectorAll(".c-slide");
  const dots = box.querySelectorAll(".c-dot");
  if(!slides.length) return;
  carouselIndex = ((i % slides.length) + slides.length) % slides.length;
  slides.forEach((s, idx) => s.classList.toggle("active", idx === carouselIndex));
  dots.forEach((d, idx) => d.classList.toggle("active", idx === carouselIndex));
}
function buildCarousel(box, images, label){
  carouselTotal = images.length;
  carouselIndex = 0;
  const wrap = document.createElement("div");
  wrap.className = "media-carousel";
  wrap.innerHTML =
    images.map((url, i) => `<div class="c-slide ${i===0?'active':''}"><img src="${url}" alt="${escapeHtml(label||'')} ${i+1}"></div>`).join("") +
    `<button class="c-arrow c-prev" type="button">‹</button>
     <button class="c-arrow c-next" type="button">›</button>
     <div class="c-dots">${images.map((_,i)=>`<button class="c-dot ${i===0?'active':''}" type="button" data-i="${i}"></button>`).join("")}</div>`;
  box.appendChild(wrap);
  wrap.querySelector(".c-prev").addEventListener("click", () => { showCarouselSlide(carouselIndex - 1); startCarouselTimer(); });
  wrap.querySelector(".c-next").addEventListener("click", () => { showCarouselSlide(carouselIndex + 1); startCarouselTimer(); });
  wrap.querySelectorAll(".c-dot").forEach(dot => dot.addEventListener("click", () => { showCarouselSlide(Number(dot.dataset.i)); startCarouselTimer(); }));
  startCarouselTimer();
}

function setMediaBox(p){
  const box = document.getElementById("media-box");
  stopCarouselTimer();
  carouselTotal = 0;
  box.innerHTML = "";
  if(p.video_url){
    const v = document.createElement("video");
    v.autoplay = true; v.muted = true; v.loop = true; v.playsInline = true; v.controls = true;
    v.src = p.video_url;
    v.onerror = () => { box.innerHTML = ""; appendImageOrPlaceholder(box, p); };
    box.appendChild(v);
    return;
  }
  const images = [p.cover, ...(Array.isArray(p.gallery) ? p.gallery : [])].filter(Boolean);
  if(images.length > 1){
    buildCarousel(box, images, p.name);
  }else{
    appendImageOrPlaceholder(box, p);
  }
}
function appendImageOrPlaceholder(box, p){
  const img = document.createElement("img");
  img.alt = p.name || "";
  img.src = p.cover || placeholderDataUri(p.name);
  img.onerror = () => { img.onerror = null; img.src = placeholderDataUri(p.name); };
  box.appendChild(img);
}

const drawer = document.getElementById("drawer");
function openDrawer(p){
  currentDrawerPoiId = p.poi_id;
  if(drawer.classList.contains("vr-mode")){ exitDrawerVrMode(); }
  const st = eraStyle(p.era);
  document.getElementById("drawer-num").textContent = "NO. " + pad(p.poi_id);
  const eraTag = document.getElementById("drawer-era");
  eraTag.textContent = p.era || "未分类";
  eraTag.style.background = st.hex;
  document.getElementById("drawer-name").textContent = p.name;
  document.getElementById("drawer-story").textContent = p.story || "";

  setMediaBox(p);

  const audioBlock = document.getElementById("audio-block");
  const audioEl = document.getElementById("drawer-audio");
  if(p.audio_url){ audioBlock.style.display="flex"; audioEl.src = p.audio_url; }
  else { audioBlock.style.display="none"; audioEl.removeAttribute("src"); }

  const vrBtn = document.getElementById("btn-vr");
  vrBtn.disabled = !p.vr_work_id && !p.vr_url;
  vrBtn.onclick = () => {
    if(p.vr_work_id){ enterDrawerVrMode(p.vr_work_id); }
    else if(p.vr_url){ window.open(p.vr_url, "_blank"); }
  };

  document.getElementById("btn-nav").onclick = () => navigateTo(p);

  drawer.classList.remove("vr-mode");
  drawer.classList.add("open");
  drawer.setAttribute("aria-hidden","false");
}
function closeDrawer(){
  drawer.classList.remove("open");
  drawer.setAttribute("aria-hidden","true");
  currentDrawerPoiId = null;
  exitDrawerVrMode();
  stopCarouselTimer();
  const v = document.querySelector("#media-box video");
  if(v){ v.pause(); v.removeAttribute("src"); }
  const a = document.getElementById("drawer-audio");
  a.pause(); a.removeAttribute("src");
}
document.getElementById("drawer-close").addEventListener("click", closeDrawer);

function navigateTo(p){
  const name = encodeURIComponent(p.name);
  if(isIOS()){
    window.location.href = `https://maps.apple.com/?daddr=${p.lat},${p.lng}&dirflg=d`;
  }else{
    // 安卓 / 其他：使用高德官方通用唤起链接，未安装 App 时引导网页/下载
    window.location.href = `https://uri.amap.com/navigation?to=${p.lng},${p.lat},${name}&mode=car&policy=1&src=pioneer-trail&coordinate=gaode&callnative=1`;
  }
}

/* =========================================================================
   6b. 内嵌全景查看器（复用环视台同一套 vr_scenes / vr_hotspots 数据，
       但本站只读查看，不提供编辑功能；编辑请前往环视台后台）
   ========================================================================= */
let vrRenderer = null, vrScene3d = null, vrCamera = null, vrSphereMesh = null;
let vrTexture = null, vrVideoEl = null;
let vrLon = 0, vrLat = 0;
let vrDragging = false, vrDragStart = { x:0, y:0, lon:0, lat:0 }, vrDragMoved = 0;
let vrLastInteraction = Date.now();
let vrSprites = [];
const vrRaycaster = new THREE.Raycaster();
const vrHotspotTexCache = {};
let vrAnimId = null;
let vrScenes = [];
let vrCurrentSceneId = null;
let vrCurrentWorkId = null;

function vrInitEngineOnce(){
  if(vrRenderer) return;
  const wrap = document.getElementById("vr-canvas-wrap");
  vrScene3d = new THREE.Scene();
  vrCamera = new THREE.PerspectiveCamera(90, wrap.clientWidth / Math.max(wrap.clientHeight,1), 0.1, 1200);
  vrRenderer = new THREE.WebGLRenderer({ antialias:true });
  vrRenderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  vrRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
  wrap.appendChild(vrRenderer.domElement);

  const geo = new THREE.SphereGeometry(500,60,40);
  geo.scale(-1,1,1);
  vrSphereMesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color:0x11140f }));
  vrScene3d.add(vrSphereMesh);

  const canvas = vrRenderer.domElement;
  canvas.style.cursor = "grab";
  canvas.addEventListener("pointerdown", vrOnPointerDown);
  canvas.addEventListener("pointermove", vrOnPointerMove);
  window.addEventListener("pointerup", vrOnPointerUp);
  canvas.addEventListener("wheel", vrOnWheel, { passive:false });
  window.addEventListener("resize", vrOnResize);
}
function vrOnResize(){
  if(!vrRenderer) return;
  const wrap = document.getElementById("vr-canvas-wrap");
  if(!wrap || !wrap.clientWidth || !wrap.clientHeight) return;
  vrCamera.aspect = wrap.clientWidth / wrap.clientHeight;
  vrCamera.updateProjectionMatrix();
  vrRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
}
function vrDisposeMedia(){
  if(vrVideoEl){ vrVideoEl.pause(); vrVideoEl.src=""; vrVideoEl.remove(); vrVideoEl=null; }
  if(vrTexture){ vrTexture.dispose(); vrTexture=null; }
}
function vrSphericalToVec3(yawDeg, pitchDeg, radius){
  const phi = THREE.MathUtils.degToRad(90 - pitchDeg);
  const theta = THREE.MathUtils.degToRad(yawDeg);
  return new THREE.Vector3(
    radius*Math.sin(phi)*Math.cos(theta),
    radius*Math.cos(phi),
    radius*Math.sin(phi)*Math.sin(theta)
  );
}
function vrMakeHotspotTexture(type){
  if(vrHotspotTexCache[type]) return vrHotspotTexCache[type];
  const c = document.createElement("canvas");
  c.width=128; c.height=128;
  const ctx = c.getContext("2d");
  const color = type === "scene" ? "#3f7a5c" : "#b8915a";
  ctx.beginPath(); ctx.arc(64,64,50,0,Math.PI*2);
  ctx.fillStyle = "rgba(20,18,14,0.55)"; ctx.fill();
  ctx.lineWidth = 6; ctx.strokeStyle = color; ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = "bold 56px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(type === "scene" ? "\u279c" : "i", 64, 70);
  const tex = new THREE.CanvasTexture(c);
  vrHotspotTexCache[type] = tex;
  return tex;
}
function vrClearSprites(){
  vrSprites.forEach(s => vrScene3d.remove(s));
  vrSprites = [];
}
function vrBuildSprites(hsList){
  vrClearSprites();
  hsList.forEach(h => {
    const mat = new THREE.SpriteMaterial({ map:vrMakeHotspotTexture(h.type), depthTest:false, transparent:true });
    const sprite = new THREE.Sprite(mat);
    sprite.position.copy(vrSphericalToVec3(h.yaw, h.pitch, 480));
    sprite.scale.set(26,26,1);
    sprite.userData.hotspot = h;
    vrScene3d.add(sprite);
    vrSprites.push(sprite);
  });
}
function vrAnimate(){
  vrAnimId = requestAnimationFrame(vrAnimate);
  if(!vrDragging && Date.now() - vrLastInteraction > 4000){ vrLon += 0.02; }
  vrCamera.lookAt(vrSphericalToVec3(vrLon, vrLat, 100));
  vrRenderer.render(vrScene3d, vrCamera);
}
function vrPointerToNdc(e){
  const rect = vrRenderer.domElement.getBoundingClientRect();
  return new THREE.Vector2(
    ((e.clientX-rect.left)/rect.width)*2-1,
    -((e.clientY-rect.top)/rect.height)*2+1
  );
}
function vrOnPointerDown(e){
  vrDragging = true; vrDragMoved = 0;
  vrDragStart = { x:e.clientX, y:e.clientY, lon:vrLon, lat:vrLat };
  vrLastInteraction = Date.now();
  vrRenderer.domElement.style.cursor = "grabbing";
}
function vrOnPointerMove(e){
  vrHoverCheck(e);
  if(!vrDragging) return;
  const dx = e.clientX - vrDragStart.x, dy = e.clientY - vrDragStart.y;
  vrDragMoved = Math.max(vrDragMoved, Math.abs(dx)+Math.abs(dy));
  vrLon = vrDragStart.lon - dx*0.15;
  vrLat = THREE.MathUtils.clamp(vrDragStart.lat + dy*0.15, -85, 85);
  vrLastInteraction = Date.now();
}
function vrOnPointerUp(e){
  if(!vrDragging) return;
  vrDragging = false;
  if(vrRenderer) vrRenderer.domElement.style.cursor = "grab";
  if(vrDragMoved < 6) vrHandleClick(e);
}
function vrOnWheel(e){
  e.preventDefault();
  vrCamera.fov = THREE.MathUtils.clamp(vrCamera.fov + e.deltaY*0.04, 30, 100);
  vrCamera.updateProjectionMatrix();
  vrLastInteraction = Date.now();
}
function vrHoverCheck(e){
  const tip = document.getElementById("vr-tooltip");
  if(!vrRenderer){ tip.classList.remove("show"); return; }
  vrRaycaster.setFromCamera(vrPointerToNdc(e), vrCamera);
  const hits = vrRaycaster.intersectObjects(vrSprites);
  if(hits.length){
    const h = hits[0].object.userData.hotspot;
    document.getElementById("vr-tooltip-title").textContent = h.title || (h.type === "scene" ? "前往场景" : "");
    document.getElementById("vr-tooltip-text").textContent = h.text || "";
    tip.style.left = (e.clientX+16)+"px";
    tip.style.top = (e.clientY+10)+"px";
    tip.classList.add("show");
    vrRenderer.domElement.style.cursor = "pointer";
  }else{
    tip.classList.remove("show");
    vrRenderer.domElement.style.cursor = vrDragging ? "grabbing" : "grab";
  }
}
function vrHandleClick(e){
  vrRaycaster.setFromCamera(vrPointerToNdc(e), vrCamera);
  const hits = vrRaycaster.intersectObjects(vrSprites);
  if(!hits.length) return;
  const h = hits[0].object.userData.hotspot;
  if(h.type === "scene" && h.target_scene_id){
    vrLoadScene(h.target_scene_id);
  }else{
    document.getElementById("vr-tooltip-title").textContent = h.title || "信息";
    document.getElementById("vr-tooltip-text").textContent = h.text || "";
    const tip = document.getElementById("vr-tooltip");
    tip.style.left = (e.clientX+16)+"px";
    tip.style.top = (e.clientY+10)+"px";
    tip.classList.add("show");
    setTimeout(()=>tip.classList.remove("show"), 3200);
  }
}

async function vrFetchScenes(workId){
  const { data, error } = await sb.from("vr_scenes").select("*").eq("work_id", workId).order("sort_order",{ascending:true});
  if(error){ console.warn(error); return []; }
  return data || [];
}
async function vrFetchHotspots(sceneId){
  const { data, error } = await sb.from("vr_hotspots").select("*").eq("scene_id", sceneId);
  if(error){ console.warn(error); return []; }
  return data || [];
}

async function enterDrawerVrMode(workId){
  if(!sb){ toast("尚未配置 Supabase，无法加载VR场景"); return; }
  drawer.classList.add("vr-mode");
  stopCarouselTimer();
  vrInitEngineOnce();
  setTimeout(vrOnResize, 60);
  if(vrAnimId === null){ vrAnimate(); }
  vrCurrentWorkId = workId;
  document.getElementById("vr-loading").textContent = "加载全景中…";
  document.getElementById("vr-loading").classList.remove("hide");
  vrScenes = await vrFetchScenes(workId);
  if(!vrScenes.length){
    document.getElementById("vr-loading").textContent = "该环视台作品暂无场景内容";
    vrClearSprites();
    document.getElementById("vr-scene-strip").innerHTML = "";
    return;
  }
  await vrLoadScene(vrScenes[0].id);
}
function exitDrawerVrMode(){
  drawer.classList.remove("vr-mode");
  if(vrAnimId){ cancelAnimationFrame(vrAnimId); vrAnimId = null; }
  vrDisposeMedia();
  vrClearSprites();
  vrCurrentSceneId = null;
  startCarouselTimer();
}
document.getElementById("vr-back-btn").addEventListener("click", exitDrawerVrMode);

async function vrLoadScene(sceneId){
  const rec = vrScenes.find(s => s.id === sceneId);
  if(!rec) return;
  vrCurrentSceneId = sceneId;
  vrDisposeMedia();
  document.getElementById("vr-loading").classList.remove("hide");
  document.getElementById("vr-loading").textContent = "加载全景中…";
  if(rec.media_type === "video"){
    const video = document.createElement("video");
    video.src = rec.media_url; video.crossOrigin = "anonymous";
    video.loop = true; video.muted = true; video.playsInline = true; video.autoplay = true;
    video.style.display = "none";
    document.body.appendChild(video);
    vrVideoEl = video;
    const tex = new THREE.VideoTexture(video);
    tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter; tex.generateMipmaps = false;
    vrTexture = tex;
    vrSphereMesh.material.map = tex;
    vrSphereMesh.material.color.set(0xffffff);
    vrSphereMesh.material.needsUpdate = true;
    video.play().catch(()=>{});
    document.getElementById("vr-loading").classList.add("hide");
  }else{
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin("anonymous");
    loader.load(rec.media_url, (tex) => {
      vrTexture = tex;
      vrSphereMesh.material.map = tex;
      vrSphereMesh.material.color.set(0xffffff);
      vrSphereMesh.material.needsUpdate = true;
      document.getElementById("vr-loading").classList.add("hide");
    }, undefined, () => {
      document.getElementById("vr-loading").classList.add("hide");
      toast("全景场景加载失败");
    });
  }
  vrLon = rec.yaw || 0; vrLat = rec.pitch || 0;
  vrCamera.fov = rec.fov || 90;
  vrCamera.updateProjectionMatrix();
  const hs = await vrFetchHotspots(sceneId);
  vrBuildSprites(hs);
  vrRenderSceneStrip();
}
function vrRenderSceneStrip(){
  const strip = document.getElementById("vr-scene-strip");
  if(vrScenes.length < 2){ strip.innerHTML = ""; return; }
  strip.innerHTML = vrScenes.map(s =>
    `<button class="vchip ${s.id===vrCurrentSceneId?'active':''}" data-sid="${s.id}">${escapeHtml(s.name)}</button>`
  ).join("");
  strip.querySelectorAll(".vchip").forEach(btn => btn.addEventListener("click", () => vrLoadScene(Number(btn.dataset.sid))));
}

/* =========================================================================
   7b. 媒体文件上传（写入 Supabase Storage 的 poi-media 公开桶）
   ========================================================================= */
const UPLOAD_LIMITS_MB = { cover:10, video:150, audio:30 };
/* 注意：Supabase 项目对单文件大小有一个全局上限（默认通常是 50MB），
   如果 VR 视频比较大、上传失败，去 Dashboard → Storage → Settings 里调大这个全局限制。*/

async function uploadToStorage(file, folder){
  if(!sb){ return { error:"尚未配置 Supabase，无法上传" }; }
  const safeName = file.name.replace(/[^a-zA-Z0-9.\-_]/g, "_");
  const path = `${folder}/${Date.now()}_${safeName}`;
  const { error } = await sb.storage.from("poi-media").upload(path, file, { cacheControl:"3600", upsert:false });
  if(error){ return { error: error.message }; }
  const { data } = sb.storage.from("poi-media").getPublicUrl(path);
  return { url: data.publicUrl };
}

function wireUpload({ fileId, urlId, statusId, folder, maxMB, previewId }){
  const fileInput = document.getElementById(fileId);
  const urlInput = document.getElementById(urlId);
  const status = document.getElementById(statusId);
  fileInput.addEventListener("change", async () => {
    const file = fileInput.files[0];
    if(!file) return;
    if(file.size > maxMB * 1024 * 1024){
      status.textContent = `文件过大，上限 ${maxMB}MB`;
      status.className = "upload-status err";
      fileInput.value = "";
      return;
    }
    status.textContent = "上传中…";
    status.className = "upload-status";
    const { url, error } = await uploadToStorage(file, folder);
    if(error){
      status.textContent = "上传失败：" + error;
      status.className = "upload-status err";
    }else{
      urlInput.value = url;
      status.textContent = "已上传 ✓ " + file.name;
      status.className = "upload-status ok";
      if(previewId){
        const img = document.getElementById(previewId);
        img.src = url;
        img.classList.add("show");
      }
    }
    fileInput.value = "";
  });
}

wireUpload({ fileId:"p-cover-file", urlId:"p-cover", statusId:"p-cover-status", folder:"cover", maxMB:UPLOAD_LIMITS_MB.cover, previewId:"p-cover-preview" });
wireUpload({ fileId:"p-video-file", urlId:"p-video", statusId:"p-video-status", folder:"video", maxMB:UPLOAD_LIMITS_MB.video });
wireUpload({ fileId:"p-audio-file", urlId:"p-audio", statusId:"p-audio-status", folder:"audio", maxMB:UPLOAD_LIMITS_MB.audio });

/* 图片集：支持一次选多张，逐张上传，成功的链接累积进 pendingGallery 数组，
   2 张及以上时抽屉里会自动轮播播放（仅在该点位未设置短视频时生效）。 */
let pendingGallery = [];
function renderGalleryStrip(){
  const strip = document.getElementById("p-gallery-strip");
  strip.innerHTML = pendingGallery.map((url, i) => `
    <div class="gallery-thumb" data-i="${i}">
      <img src="${url}" alt="图片${i+1}">
      <div class="g-remove" data-gremove="${i}">✕</div>
    </div>`).join("");
  strip.querySelectorAll("[data-gremove]").forEach(btn => btn.addEventListener("click", () => {
    pendingGallery.splice(Number(btn.dataset.gremove), 1);
    renderGalleryStrip();
  }));
}
document.getElementById("p-gallery-file").addEventListener("change", async () => {
  const input = document.getElementById("p-gallery-file");
  const files = Array.from(input.files || []);
  if(!files.length) return;
  const status = document.getElementById("p-gallery-status");
  for(const file of files){
    if(file.size > UPLOAD_LIMITS_MB.cover * 1024 * 1024){
      status.textContent = `「${file.name}」过大，已跳过（上限 ${UPLOAD_LIMITS_MB.cover}MB）`;
      status.className = "upload-status err";
      continue;
    }
    status.textContent = `上传中…（${file.name}）`;
    status.className = "upload-status";
    const { url, error } = await uploadToStorage(file, "gallery");
    if(error){
      status.textContent = `「${file.name}」上传失败：` + error;
      status.className = "upload-status err";
    }else{
      pendingGallery.push(url);
      renderGalleryStrip();
      status.textContent = `已上传 ${pendingGallery.length} 张`;
      status.className = "upload-status ok";
    }
  }
  input.value = "";
});

function resetUploadWidgets(){
  ["p-cover-status","p-video-status","p-audio-status","p-gallery-status"].forEach(id => {
    const el = document.getElementById(id);
    el.textContent = ""; el.className = "upload-status";
  });
  const preview = document.getElementById("p-cover-preview");
  preview.classList.remove("show");
  preview.src = "";
  pendingGallery = [];
  renderGalleryStrip();
}

async function populateVrWorkDropdown(selectedId){
  const sel = document.getElementById("p-vr-work");
  if(!sb){ return; }
  try{
    const { data, error } = await sb.from("vr_works").select("id,title").order("created_at", { ascending:false });
    if(error) throw error;
    sel.innerHTML = '<option value="">— 不关联，使用下方外部链接 —</option>' +
      (data||[]).map(w => `<option value="${w.id}">${escapeHtml(w.title)}</option>`).join("");
    sel.value = selectedId ? String(selectedId) : "";
  }catch(e){
    console.warn("读取环视台作品列表失败", e);

function fillPointForm(p){
  document.getElementById("p-name").value = p.name || "";
  document.getElementById("p-era").value = p.era || "晚清";
  document.getElementById("p-level").value = p.level || 2;
  document.getElementById("p-story").value = p.story || "";
  document.getElementById("p-cover").value = p.cover || "";
  document.getElementById("p-video").value = p.video_url || "";
  document.getElementById("p-audio").value = p.audio_url || "";

function onMapClickAdmin(e){
  if(relocateTargetId !== null){
    const target = pois.find(p => p.poi_id === relocateTargetId);
    relocateTargetId = null;
    if(target){ openEditPoiForm(target, e.latlng); toast("位置已更新，记得点击「保存修改」确认"); }
    return;
  }
  editingPoiId = null;
  pendingLatLng = e.latlng;
  document.getElementById("point-modal-title").textContent = "新增点位";
  document.getElementById("point-submit-btn").textContent = "一键发布";
  document.getElementById("relocate-hint").style.display = "none";

  document.getElementById("point-form").reset();
  document.getElementById("p-level").value = 2;
  document.getElementById("point-err").textContent = "";

  populateVrWorkDropdown();

}

function openEditPoiForm(p, overrideLatLng){
  editingPoiId = p.poi_id;
  pendingLatLng = overrideLatLng || { lat:p.lat, lng:p.lng };
  document.getElementById("point-modal-title").textContent = `编辑点位：${p.name}`;
  document.getElementById("point-submit-btn").textContent = "保存修改";
  document.getElementById("point-coords").textContent = `纬度 ${pendingLatLng.lat.toFixed(6)} · 经度 ${pendingLatLng.lng.toFixed(6)}`;
  document.getElementById("relocate-hint").style.display = "block";
  document.getElementById("point-form").reset();
  document.getElementById("point-err").textContent = "";
  resetUploadWidgets();
  fillPointForm(p);

}

document.getElementById("point-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = document.getElementById("point-err");
  if(!sb){ errEl.textContent = "尚未配置 Supabase，无法发布。"; return; }
  if(!pendingLatLng){ errEl.textContent = "缺少地图坐标，请重新在地图上点击取点。"; return; }

  const era = document.getElementById("p-era").value;
  const fieldsPayload = {
    name: document.getElementById("p-name").value.trim(),
    lat: pendingLatLng.lat,
    lng: pendingLatLng.lng,
    era,
    story: document.getElementById("p-story").value.trim(),
    cover: document.getElementById("p-cover").value.trim(),
    video_url: document.getElementById("p-video").value.trim(),
    audio_url: document.getElementById("p-audio").value.trim(),
    vr_url: document.getElementById("p-vr").value.trim(),
    vr_work_id: document.getElementById("p-vr-work").value ? Number(document.getElementById("p-vr-work").value) : null,
    gallery: pendingGallery,
    color_type: era,
    level: Number(document.getElementById("p-level").value) || 1
  };

  markSelfUpdate();
  let synced = false;
  if(editingPoiId !== null){
    const { error } = await sb.from("pois").update(fieldsPayload).eq("poi_id", editingPoiId);
    if(error){ errEl.textContent = "保存失败：" + error.message; return; }
    synced = await syncVrWorkLocation(fieldsPayload);
    pointOverlay.classList.remove("show");
    toast(synced ? "修改已保存，关联的环视台作品位置也已同步" : "修改已保存并同步给所有访客");
    editingPoiId = null;
  }else{
    const nextId = pois.length ? Math.max(...pois.map(p=>p.poi_id)) + 1 : 1;
    const nextOrder = pois.length ? Math.max(...pois.map(p=>p.sort_order||p.poi_id)) + 1 : 1;
    const { error } = await sb.from("pois").insert({ poi_id:nextId, sort_order:nextOrder, ...fieldsPayload });
    if(error){ errEl.textContent = "写入失败：" + error.message; return; }
    synced = await syncVrWorkLocation(fieldsPayload);
    pointOverlay.classList.remove("show");
    toast(synced ? "已发布到全球 🌍 · 环视台作品位置已同步" : "已发布到全球 🌍");
  }
  pois = await fetchPois();
  renderAll();
});

/* 把点位坐标和名称推送给其关联的环视台作品（vr_works.lat/lng/location_name），
   让该作品也能正确出现在"环视台"首页的地图聚合模式里。仅在确实选择了
   关联作品时才会写入；同步失败不影响点位本身的保存，只在控制台留下警告。 */
async function syncVrWorkLocation(payload){
  if(!payload.vr_work_id) return false;
  const { error } = await sb.from("vr_works").update({
    lat: payload.lat,
    lng: payload.lng,
    location_name: payload.name
  }).eq("id", payload.vr_work_id);
  if(error){ console.warn("同步环视台作品位置失败：", error.message); return false; }
  return true;
}

/* =========================================================================
   8b. 实时同步（Supabase Realtime）—— 任意客户端的增删改，
   所有在线访客（包括其他管理员）都会立即看到，无需手动刷新页面。
   注意：需要在 Supabase 控制台「Database → Replication」中为 pois 表开启 Realtime。
   ========================================================================= */
function subscribeRealtime(){
  if(!sb) return;
  const dot = document.getElementById("sync-dot");
  sb.channel("pois-realtime")
    .on("postgres_changes", { event:"*", schema:"public", table:"pois" }, async () => {
      pois = await fetchPois();
      renderAll();
      if(Date.now() > suppressRealtimeToastUntil){ toast("点位数据已实时更新"); }
    })
    .subscribe((status) => {
      if(!dot) return;
      const live = status === "SUBSCRIBED";
      dot.classList.toggle("live", live);
      dot.title = live ? "实时同步中" : "实时同步未连接";
    });
}

/* =========================================================================
   9. 启动
   ========================================================================= */
(async function init(){
  if(isConfigured){
    const loaded = await waitForSupabase();
    if(loaded){
      try{ sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
      catch(e){ console.warn("Supabase 初始化失败", e); }
    }else{
      console.warn("Supabase SDK 加载超时，进入演示模式");
    }
  }
  pois = await fetchPois();
  renderAll();
  subscribeRealtime();
  if(sb){
    const { data } = await sb.auth.getSession();
    if(data && data.session){ setAdminMode(true); }
  }
})();
</script>
